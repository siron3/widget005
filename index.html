<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Dump</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=Josefin+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #a8d8ea; --sky-light: #d6eef8; --sky-pale: #E4F2FC;
    --brown: #8b6f5e; --brown-light: #c4a882;
    --text: #4a3728; --text-muted: #9e7c6a; --text-light: #c4a882;
    --white: #ffffff; --border: rgba(139,111,94,0.15); --shadow: rgba(139,111,94,0.10);
    --radius: 14px; --mint: #b8dfd0; --blush: #f2c4b8;
    --dump-bg: #f2f2f2; --dump-border: #e0e0e0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--sky-pale); border-radius: 99px; } ::-webkit-scrollbar-thumb { background: var(--sky); border-radius: 99px; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--sky-pale); min-height: 100vh;
    padding: 16px 16px 40px; color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .widget { max-width: 560px; margin: 0 auto; }

  /* ヘッダー */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--brown); }
  .header-date { font-size: 11px; color: var(--text-muted); }
  .header-right { display: flex; align-items: center; gap: 6px; }

  /* 日付ナビ */
  .nav-btn {
    width: 26px; height: 26px; border: 1.5px solid var(--border);
    background: var(--white); border-radius: 8px; cursor: pointer;
    color: var(--text-muted); font-size: 14px; line-height: 1;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--sky-pale); border-color: var(--sky); color: var(--brown); }
  .today-btn {
    font-size: 10px; font-weight: 700; padding: 3px 10px;
    border: 1.5px solid var(--border); background: var(--white);
    border-radius: 99px; cursor: pointer; color: var(--text-muted);
    font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s;
  }
  .today-btn:hover { background: var(--sky-pale); border-color: var(--sky); color: var(--brown); }
  .today-btn.is-today { border-color: var(--sky); color: var(--brown); }

  /* MIND RESETボタン */
  .reset-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 20px; border-radius: 99px;
    background: var(--white); border: 1.5px solid var(--border);
    cursor: pointer; font-family: 'Josefin Sans', sans-serif;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.08em; transition: all 0.2s;
    box-shadow: 0 2px 8px var(--shadow);
    width: 100%; justify-content: center; margin-bottom: 12px;
  }
  .reset-btn:hover { background: var(--sky-pale); border-color: var(--sky); color: var(--brown); transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
  .reset-btn:active { transform: translateY(0); }
  .reset-icon { font-size: 16px; }

  /* ダンプリスト */
  .dump-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

  /* 個別ボックス */
  .dump-box {
    background: var(--dump-bg); border: 1.5px solid var(--dump-border);
    border-radius: 10px; padding: 10px 12px;
    display: flex; gap: 8px; align-items: flex-start;
    animation: slideIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .dump-textarea {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px;
    color: var(--text); resize: none; min-height: 40px;
    line-height: 1.6;
  }
  .dump-textarea::placeholder { color: #bbb; }
  .dump-delete {
    width: 22px; height: 22px; border-radius: 6px;
    border: none; background: transparent; cursor: pointer;
    color: #ccc; font-size: 14px; line-height: 1;
    transition: all 0.15s; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
  }
  .dump-delete:hover { background: var(--blush); color: var(--brown); }

  /* 空の状態 */
  .empty-state {
    text-align: center; padding: 32px 20px;
    color: var(--text-muted); font-size: 13px;
    background: var(--white); border: 1.5px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty-state .empty-icon { font-size: 28px; margin-bottom: 8px; display: block; }

  /* フッター */
  .footer { display: flex; align-items: center; justify-content: space-between; }
  .count-label { font-size: 11px; color: var(--text-muted); }
  .clear-btn {
    font-size: 10px; font-weight: 700; padding: 4px 12px;
    border: 1.5px solid var(--border); background: var(--white);
    border-radius: 99px; cursor: pointer; color: var(--text-muted);
    font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--blush); color: #e07b6a; }

  /* 保存バッジ */
  .saved-badge {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--brown); color: white; font-size: 12px;
    padding: 7px 18px; border-radius: 99px;
    opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 9999;
    font-family: 'Zen Maru Gothic', sans-serif;
  }
  .saved-badge.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="widget">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <div class="header-title">🧠 Brain Dump</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div class="header-right">
      <button class="nav-btn" onclick="changeDay(-1)">‹</button>
      <button class="today-btn" id="todayBtn" onclick="goToday()">今日</button>
      <button class="nav-btn" onclick="changeDay(1)">›</button>
    </div>
  </div>

  <!-- MIND RESETボタン -->
  <button class="reset-btn" onclick="addBox()">
    <span class="reset-icon">🔄</span>MIND RESET
  </button>

  <!-- ダンプリスト -->
  <div class="dump-list" id="dumpList"></div>

  <!-- フッター -->
  <div class="footer">
    <div class="count-label" id="countLabel"></div>
    <button class="clear-btn" onclick="clearAll()">全部クリア</button>
  </div>

</div>
<div class="saved-badge" id="savedBadge">保存しました ✦</div>

<script>
const SUPABASE_URL = 'https://nbduyknklcwqbinvhoih.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZHV5a25rbGN3cWJpbnZob2loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NjMzNjUsImV4cCI6MjA4NzIzOTM2NX0.kzZYqBwfc8vpGszN2W3so2jURsZXlrve4KvUydYKIfA';

async function sbFetch(path, options = {}) {
  const { headers: extraHeaders, ...rest } = options;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...rest,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      ...(extraHeaders || {})
    }
  });
  if (res.status === 204) return null;
  if (!res.ok) throw new Error(await res.text());
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

let currentDate = new Date(); currentDate.setHours(0,0,0,0);
let entries = []; // { id, text }
let saveTimer = null;

function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday() {
  const t = new Date(); t.setHours(0,0,0,0);
  return dateStr(currentDate) === dateStr(t);
}
function updateHeader() {
  const dow = '日月火水木金土'[currentDate.getDay()];
  document.getElementById('headerDate').textContent =
    `${currentDate.getMonth()+1}月${currentDate.getDate()}日（${dow}）`;
  const btn = document.getElementById('todayBtn');
  btn.classList.toggle('is-today', isToday());
}

function changeDay(n) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + n);
  updateHeader();
  loadDump();
}
function goToday() {
  currentDate = new Date(); currentDate.setHours(0,0,0,0);
  updateHeader();
  loadDump();
}

// ボックス追加
function addBox(text = '') {
  const id = Date.now();
  entries.push({ id, text });
  renderList();
  // 新しいボックスにフォーカス
  setTimeout(() => {
    const el = document.getElementById('dump-' + id);
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 50);
  autoSave();
}

// 個別削除
function deleteBox(id) {
  entries = entries.filter(e => e.id !== id);
  renderList();
  autoSave();
}

// 全クリア
function clearAll() {
  if (entries.length === 0) return;
  if (!confirm('全部クリアしますか？')) return;
  entries = [];
  renderList();
  autoSave();
}

// テキスト更新
function updateText(id, text) {
  const entry = entries.find(e => e.id === id);
  if (entry) entry.text = text;
  autoSave();
}

// 自動リサイズ
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function renderList() {
  const el = document.getElementById('dumpList');
  const count = document.getElementById('countLabel');

  if (entries.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">💭</span>
        MIND RESETを押して<br>頭の中を吐き出そう
      </div>`;
    count.textContent = '';
    return;
  }

  el.innerHTML = entries.map(e => `
    <div class="dump-box">
      <textarea
        class="dump-textarea"
        id="dump-${e.id}"
        placeholder="頭の中にあることを自由に…"
        oninput="updateText(${e.id}, this.value); autoResize(this)"
      >${e.text}</textarea>
      <button class="dump-delete" onclick="deleteBox(${e.id})" title="削除">✕</button>
    </div>
  `).join('');

  // 各テキストエリアの高さを調整
  entries.forEach(e => {
    const ta = document.getElementById('dump-' + e.id);
    if (ta) autoResize(ta);
  });

  count.textContent = `${entries.length}件`;
}

// 保存
let isSaving = false;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 1000);
}

async function save() {
  if (isSaving) return;
  isSaving = true;
  const key = dateStr(currentDate);
  const json = JSON.stringify(entries);
  try {
    await sbFetch(`brain_dumps?date=eq.${key}`, { method: 'DELETE' });
    await sbFetch('brain_dumps', {
      method: 'POST',
      body: JSON.stringify({ date: key, entries_json: json })
    });
    showBadge();
  } catch(e) {
    console.error('保存エラー:', e);
  } finally {
    isSaving = false;
  }
}

async function loadDump() {
  entries = [];
  try {
    const rows = await sbFetch(`brain_dumps?date=eq.${dateStr(currentDate)}&select=*`);
    if (rows && rows.length > 0) {
      entries = JSON.parse(rows[0].entries_json || '[]');
    }
  } catch(e) { console.error(e); }
  renderList();
}

function showBadge() {
  const b = document.getElementById('savedBadge');
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 2000);
}

// 初期化
updateHeader();
loadDump();
</script>
</body>
</html>
