<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #a8d8ea;
    --sky-light: #d6eef8;
    --sky-pale: #eef7fc;
    --brown: #8b6f5e;
    --brown-light: #c4a882;
    --brown-pale: #f5ede6;
    --cream: #fdf8f3;
    --blush: #f2c4b8;
    --mint: #b8dfd0;
    --lavender: #d4c5e8;
    --yellow: #fce8a2;
    --text: #4a3728;
    --text-muted: #9e7c6a;
    --text-light: #c4a882;
    --white: #ffffff;
    --border: rgba(139,111,94,0.15);
    --shadow: rgba(139,111,94,0.10);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--sky-pale);
    min-height: 100vh;
    padding: 20px 16px 40px;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .widget { max-width: 640px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; padding: 0 2px;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--brown); }
  .header-sub { font-size: 11px; color: var(--text-muted); }

  /* Login button */
  .login-card {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 32px 20px;
    box-shadow: 0 2px 12px var(--shadow);
    text-align: center;
  }
  .login-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
  .login-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 99px;
    border: 1.5px solid var(--sky); background: var(--white);
    color: var(--brown); font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: 'Zen Maru Gothic', sans-serif;
    transition: all 0.15s ease; box-shadow: 0 2px 8px var(--shadow);
  }
  .login-btn:hover { background: var(--sky-pale); }
  .login-btn svg { width: 18px; height: 18px; }

  /* Loading */
  .loading-bar {
    height: 3px; background: var(--sky-light); border-radius: 99px;
    margin-bottom: 12px; overflow: hidden; opacity: 0; transition: opacity 0.2s;
  }
  .loading-bar.visible { opacity: 1; }
  .loading-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--sky), var(--brown-light));
    border-radius: 99px; animation: loadingAnim 1.2s ease-in-out infinite;
  }
  @keyframes loadingAnim {
    0% { width: 0%; margin-left: 0; }
    50% { width: 70%; margin-left: 15%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* Month nav */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; background: var(--white);
    border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px; box-shadow: 0 2px 8px var(--shadow);
  }
  .month-label { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--brown); }
  .nav-group { display: flex; gap: 4px; align-items: center; }
  .nav-btn {
    width: 28px; height: 28px; border: 1.5px solid var(--border);
    background: var(--white); border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.15s ease;
  }
  .nav-btn:hover { background: var(--sky-pale); border-color: var(--sky); color: var(--brown); }
  .nav-btn svg { width: 12px; height: 12px; }
  .today-chip {
    font-size: 10px; font-weight: 700; padding: 3px 10px;
    border: 1.5px solid var(--border); background: var(--white);
    border-radius: 99px; cursor: pointer; color: var(--text-muted);
    font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s ease;
  }
  .today-chip:hover { background: var(--sky-pale); border-color: var(--sky); color: var(--brown); }

  /* Calendar grid */
  .cal-card {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow); margin-bottom: 12px;
  }
  .cal-grid { width: 100%; border-collapse: collapse; }
  .cal-grid thead th {
    padding: 8px 4px; font-size: 10px; font-weight: 700;
    color: var(--text-muted); text-align: center;
    border-bottom: 1.5px solid var(--border);
    background: rgba(168,216,234,0.08);
  }
  .cal-grid thead th:first-child { color: var(--blush); }
  .cal-grid thead th:last-child { color: var(--blush); }

  .cal-cell {
    vertical-align: top; padding: 4px;
    border: 1px solid var(--border); min-height: 72px; width: calc(100%/7);
  }
  .cal-cell.other-month { background: rgba(239,247,252,0.5); }
  .cal-cell.is-today { background: rgba(168,216,234,0.1); }
  .cal-cell.is-weekend .day-num { color: var(--blush); }

  .day-num {
    font-family: 'DM Serif Display', serif; font-size: 13px;
    color: var(--text-muted); display: block; text-align: center;
    margin-bottom: 2px; line-height: 1;
  }
  .cal-cell.is-today .day-num {
    background: var(--sky); color: white; border-radius: 50%;
    width: 22px; height: 22px; display: flex; align-items: center;
    justify-content: center; margin: 0 auto 2px; font-size: 11px;
  }
  .cal-cell.other-month .day-num { color: var(--text-light); opacity: 0.5; }

  .event-chip {
    display: block; font-size: 9px; padding: 2px 4px;
    border-radius: 4px; margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: default; line-height: 1.4; font-weight: 500;
  }
  .more-events {
    font-size: 8px; color: var(--text-muted); text-align: center;
    cursor: pointer; padding: 1px;
  }

  /* Upcoming events */
  .upcoming-card {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .upcoming-header {
    padding: 10px 14px 8px; border-bottom: 1.5px solid var(--border);
    background: rgba(168,216,234,0.08);
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .upcoming-list { padding: 6px 10px 10px; }
  .upcoming-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 7px 4px; border-bottom: 1px solid var(--border);
  }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-date {
    min-width: 36px; text-align: center;
    font-family: 'DM Serif Display', serif;
  }
  .upcoming-date .u-day { font-size: 18px; color: var(--brown); line-height: 1; }
  .upcoming-date .u-dow { font-size: 9px; color: var(--text-muted); }
  .upcoming-dot { width: 3px; min-width: 3px; border-radius: 99px; align-self: stretch; margin-top: 3px; }
  .upcoming-info { flex: 1; }
  .upcoming-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .upcoming-time { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .no-events { text-align: center; padding: 20px; font-size: 12px; color: var(--text-muted); }

  /* Logout */
  .logout-btn {
    font-size: 10px; padding: 3px 10px;
    border: 1.5px solid var(--border); background: var(--white);
    border-radius: 99px; cursor: pointer; color: var(--text-muted);
    font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s;
  }
  .logout-btn:hover { border-color: var(--blush); color: var(--blush); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--brown); color: white; font-size: 12px; font-weight: 500;
    padding: 8px 18px; border-radius: 99px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 9999;
    font-family: 'Zen Maru Gothic', sans-serif;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="header-left">
      <div class="header-title">Calendar ✦</div>
      <div class="header-sub" id="headerSub">Googleカレンダーと連携</div>
    </div>
    <div id="headerRight"></div>
  </div>

  <div class="loading-bar" id="loadingBar"><div class="loading-bar-fill"></div></div>

  <div id="loginArea">
    <div class="login-card">
      <p>Googleカレンダーのイベントを表示します</p>
      <button class="login-btn" onclick="handleLogin()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン
      </button>
    </div>
  </div>

  <div id="calArea" style="display:none">
    <div class="month-nav">
      <div class="month-label" id="monthLabel">—</div>
      <div class="nav-group">
        <button class="nav-btn" onclick="moveMonth(-1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="today-chip" onclick="goThisMonth()">今月</button>
        <button class="nav-btn" onclick="moveMonth(1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>

    <div class="cal-card">
      <table class="cal-grid">
        <thead>
          <tr>
            <th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
          </tr>
        </thead>
        <tbody id="calBody"></tbody>
      </table>
    </div>

    <div class="upcoming-card">
      <div class="upcoming-header">✦ 直近の予定</div>
      <div class="upcoming-list" id="upcomingList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID = '413389999896-amautmb7ibrl1u4ckn3k13jt31lsp954.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

const MONTHS_JP = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DOW_JP = ['日','月','火','水','木','金','土'];

let tokenClient = null;
let accessToken = null;
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let allEvents = [];

// Event colors (Google calendar color IDs → our palette)
const COLOR_MAP = [
  '#a8d8ea','#b8dfd0','#d4c5e8','#fce8a2','#f2c4b8',
  '#f9d5d3','#c5dff8','#ffe4b5','#d4edda','#c4a882'
];

function getColor(i) { return COLOR_MAP[i % COLOR_MAP.length]; }

// ── Google Identity Services ──
function initGIS() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showToast('ログインエラー: ' + resp.error); return; }
      accessToken = resp.access_token;
      localStorage.setItem('gcal_token', accessToken);
      showCalArea();
      await fetchEvents();
    }
  });
}

function handleLogin() {
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function handleLogout() {
  google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null;
  localStorage.removeItem('gcal_token');
  document.getElementById('loginArea').style.display = 'block';
  document.getElementById('calArea').style.display = 'none';
  document.getElementById('headerRight').innerHTML = '';
  document.getElementById('headerSub').textContent = 'Googleカレンダーと連携';
}

function showCalArea() {
  document.getElementById('loginArea').style.display = 'none';
  document.getElementById('calArea').style.display = 'block';
  document.getElementById('headerSub').textContent = 'Googleカレンダー連携中 ✦';
  document.getElementById('headerRight').innerHTML =
    `<button class="logout-btn" onclick="handleLogout()">ログアウト</button>`;
}

// ── Fetch events ──
function setLoading(val) {
  document.getElementById('loadingBar').classList.toggle('visible', val);
}

async function fetchEvents() {
  if (!accessToken) return;
  setLoading(true);

  const now = new Date();
  const timeMin = new Date(currentYear, currentMonth, 1).toISOString();
  const timeMax = new Date(currentYear, currentMonth + 1, 0, 23, 59, 59).toISOString();

  try {
    const res = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=100`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    if (res.status === 401) {
      showToast('セッションが切れました。再ログインしてください。');
      handleLogout(); return;
    }
    const data = await res.json();
    allEvents = data.items || [];
    renderCalendar();
    renderUpcoming();
  } catch(e) {
    showToast('カレンダーの取得に失敗しました');
  } finally {
    setLoading(false);
  }
}

// ── Render calendar ──
function renderCalendar() {
  document.getElementById('monthLabel').textContent =
    `${currentYear}年 ${MONTHS_JP[currentMonth]}`;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();

  // Build event map: date string -> events[]
  const eventMap = {};
  allEvents.forEach((ev, i) => {
    const start = ev.start.date || ev.start.dateTime;
    const dk = start.substring(0, 10);
    if (!eventMap[dk]) eventMap[dk] = [];
    eventMap[dk].push({ ...ev, colorIdx: i });
  });

  let html = '';
  let dayCount = 0;
  let date = 1;
  const prevLastDate = new Date(currentYear, currentMonth, 0).getDate();

  for (let row = 0; row < 6; row++) {
    if (date > lastDate) break;
    html += '<tr>';
    for (let col = 0; col < 7; col++) {
      let cellDate, isOther = false, isWknd = col === 0 || col === 6;
      if (row === 0 && col < firstDay) {
        cellDate = prevLastDate - firstDay + col + 1;
        isOther = true;
      } else if (date > lastDate) {
        cellDate = date - lastDate;
        date++;
        isOther = true;
      } else {
        cellDate = date++;
      }

      const dk = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(isOther?'??':cellDate).padStart(2,'0')}`;
      const isToday = !isOther &&
        today.getFullYear()===currentYear &&
        today.getMonth()===currentMonth &&
        today.getDate()===cellDate;

      let cls = 'cal-cell';
      if (isOther) cls += ' other-month';
      if (isToday) cls += ' is-today';
      if (isWknd) cls += ' is-weekend';

      const realDk = isOther ? null : `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(cellDate).padStart(2,'0')}`;
      const dayEvents = (realDk && eventMap[realDk]) || [];
      const maxShow = 2;
      let evHtml = '';
      dayEvents.slice(0, maxShow).forEach((ev, i) => {
        const color = getColor(ev.colorIdx);
        const title = ev.summary || '(無題)';
        evHtml += `<span class="event-chip" style="background:${color}33;color:${color.replace('ea','8b').replace('d0','6a').replace('e8','7a').replace('a2','8a').replace('b8','8a').replace('d3','8a').replace('f8','8a').replace('b5','8a').replace('da','8a').replace('82','6a')};border-left:2px solid ${color}" title="${title}">${title}</span>`;
      });
      if (dayEvents.length > maxShow) {
        evHtml += `<div class="more-events">+${dayEvents.length - maxShow}件</div>`;
      }

      html += `<td class="${cls}">
        <span class="day-num">${cellDate}</span>
        ${evHtml}
      </td>`;
    }
    html += '</tr>';
  }
  document.getElementById('calBody').innerHTML = html;
}

// ── Render upcoming ──
function renderUpcoming() {
  const now = new Date(); now.setHours(0,0,0,0);
  const upcoming = allEvents
    .filter(ev => {
      const start = new Date(ev.start.date || ev.start.dateTime);
      return start >= now;
    })
    .slice(0, 7);

  if (upcoming.length === 0) {
    document.getElementById('upcomingList').innerHTML =
      `<div class="no-events">今月の残り予定はありません ✦</div>`;
    return;
  }

  let html = '';
  upcoming.forEach((ev, i) => {
    const startRaw = ev.start.date || ev.start.dateTime;
    const start = new Date(startRaw);
    const isAllDay = !!ev.start.date;
    const color = getColor(i);
    const dow = DOW_JP[start.getDay()];
    const timeStr = isAllDay ? '終日' :
      `${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}〜`;

    html += `<div class="upcoming-item">
      <div class="upcoming-date">
        <div class="u-day">${start.getDate()}</div>
        <div class="u-dow">${dow}</div>
      </div>
      <div class="upcoming-dot" style="background:${color}"></div>
      <div class="upcoming-info">
        <div class="upcoming-title">${ev.summary || '(無題)'}</div>
        <div class="upcoming-time">${timeStr}${ev.location ? ' · ' + ev.location : ''}</div>
      </div>
    </div>`;
  });
  document.getElementById('upcomingList').innerHTML = html;
}

// ── Navigation ──
async function moveMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  await fetchEvents();
}

async function goThisMonth() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  await fetchEvents();
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Init ──
window.onload = () => {
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = () => {
    initGIS();
    // Try restore token
    const saved = localStorage.getItem('gcal_token');
    if (saved) {
      accessToken = saved;
      showCalArea();
      fetchEvents();
    }
  };
  document.head.appendChild(script);
};
</script>
</body>
</html>
